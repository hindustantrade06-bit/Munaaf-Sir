<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>India's Top SEBI Registered Research Analyst | 60K+</title>

  <!-- AUTO REFRESH -->
  <meta http-equiv="refresh" content="5">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    :root{
      --em:#10b981;
      --em2:#059669;
      --em3:#6ee7b7;
      --gold:#fbbf24;
      --dark:#030a07;
      --txt:#ecfdf5;
    }

    html,body{
      width:100%;
      min-height:100%;
      background:var(--dark);
      font-family:'Poppins',sans-serif;
      color:var(--txt);

      /* FIXED REFRESH / SCROLL ISSUE */
      overflow-x:hidden;
      overflow-y:auto;

      -webkit-overflow-scrolling:touch;
    }

    body{
      position:relative;
    }

    .bg{
      position:fixed;
      inset:0;
      z-index:0;
      background:
      radial-gradient(circle at top right, rgba(16,185,129,.18), transparent 35%),
      radial-gradient(circle at bottom left, rgba(251,191,36,.08), transparent 30%);
    }

    .sebi-bar{
      position:fixed;
      top:0;
      left:0;
      right:0;
      height:32px;
      background:rgba(0,0,0,.45);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(16,185,129,.25);

      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;

      z-index:100;
    }

    .sebi-dot{
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--em);
      box-shadow:0 0 10px var(--em);
      animation:pulse 1.4s infinite;
    }

    @keyframes pulse{
      0%,100%{
        transform:scale(1);
        opacity:1;
      }
      50%{
        transform:scale(.6);
        opacity:.4;
      }
    }

    .sebi-bar-txt{
      font-size:10px;
      font-weight:700;
      letter-spacing:.18em;
      color:var(--em3);
      text-transform:uppercase;
    }

    .page{
      position:relative;
      z-index:2;

      width:100%;
      min-height:100vh;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;

      padding:70px 20px 40px;
    }

    .logo-outer{
      position:relative;
      width:120px;
      height:120px;
      margin-bottom:14px;
    }

    .ring{
      position:absolute;
      inset:-8px;
      border-radius:50%;
      border:2px solid transparent;

      background:
      linear-gradient(var(--dark),var(--dark)) padding-box,
      conic-gradient(var(--em),var(--gold),var(--em3),var(--em)) border-box;

      animation:spin 5s linear infinite;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    .logo-img{
      position:absolute;
      inset:0;
      border-radius:50%;
      overflow:hidden;
      background:#111;
    }

    .logo-img img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .badge{
      position:absolute;
      bottom:-4px;
      right:-4px;

      width:32px;
      height:32px;
      border-radius:50%;

      background:linear-gradient(135deg,var(--em),var(--em2));

      display:flex;
      align-items:center;
      justify-content:center;

      font-weight:800;
      color:#fff;

      border:2px solid #000;
    }

    .title{
      text-align:center;
      margin-top:10px;
    }

    .title small{
      display:block;
      color:rgba(255,255,255,.4);
      margin-bottom:6px;
      letter-spacing:.18em;
      font-size:10px;
    }

    h1{
      font-size:34px;
      font-weight:900;
      line-height:1.1;
    }

    h1 span{
      color:var(--gold);
    }

    .tagline{
      margin-top:10px;
      color:rgba(255,255,255,.55);
      font-size:14px;
      line-height:1.6;
      text-align:center;
    }

    .stats{
      margin-top:20px;

      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;

      width:100%;
      max-width:420px;
    }

    .card{
      background:rgba(16,185,129,.07);
      border:1px solid rgba(16,185,129,.2);
      border-radius:14px;

      padding:14px 10px;
      text-align:center;
    }

    .card h2{
      font-size:22px;
      color:var(--gold);
      margin-bottom:4px;
    }

    .card p{
      font-size:11px;
      color:rgba(255,255,255,.45);
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .join-btn{
      margin-top:24px;
      width:100%;
      max-width:420px;
    }

    .join-btn a{
      display:flex;
      align-items:center;
      justify-content:center;

      width:100%;

      padding:16px 20px;

      border-radius:14px;

      text-decoration:none;

      background:linear-gradient(135deg,var(--em2),var(--em),var(--em3));

      color:#03140c;

      font-size:15px;
      font-weight:800;
      letter-spacing:.08em;

      box-shadow:0 8px 30px rgba(16,185,129,.35);

      animation:btnPulse 2s infinite;
    }

    @keyframes btnPulse{
      0%,100%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.03);
      }
    }

    .credit{
      margin-top:24px;
      font-size:12px;
      color:rgba(255,255,255,.28);
    }

    .credit a{
      color:var(--em);
      text-decoration:none;
      font-weight:700;
    }

    @media(max-width:480px){

      .page{
        padding:65px 16px 30px;
      }

      .logo-outer{
        width:105px;
        height:105px;
      }

      h1{
        font-size:26px;
      }

      .tagline{
        font-size:12px;
      }

      .stats{
        gap:8px;
      }

      .card{
        padding:12px 6px;
      }

      .card h2{
        font-size:18px;
      }

      .card p{
        font-size:9px;
      }

      .join-btn a{
        padding:14px 16px;
        font-size:13px;
      }
    }

  </style>
</head>
